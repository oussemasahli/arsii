<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Informatics AI Tutor - Learn programming, algorithms, databases, and web basics with AI that adapts to your level.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Apple Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Informatics AI Tutor">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Informatics AI Tutor</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      overflow: hidden;
    }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #0A0A0F;
    }
    .loading::after {
      content: '';
      width: 36px;
      height: 36px;
      border: 3px solid #1A1A26;
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
